<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>App Supabase PRO</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body { font-family: Arial; background:#0f172a; color:#fff; padding:20px; }
input, button { margin:5px; padding:10px; }
.hidden { display:none; }
.card { border:1px solid #334155; padding:10px; margin:10px 0; }
</style>
</head>
<body>

<h1>App PRO</h1>

<div id="auth">
  <h2>Login / Registro</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Registrar</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" class="hidden">
  <button onclick="logout()">Cerrar sesión</button>

  <h2>Crear operación</h2>
  <input id="send" placeholder="Envías">
  <input id="receive" placeholder="Recibes">
  <button onclick="crearOp()">Crear</button>

  <h3>Mis operaciones</h3>
  <div id="ops"></div>
</div>

<div id="admin" class="hidden">
  <h2>ADMIN</h2>

  <h3>Usuarios</h3>
  <div id="users"></div>

  <h3>Operaciones</h3>
  <div id="allOps"></div>

  <h3>Mensajes</h3>
  <div id="msgs"></div>
</div>

<script>
const SUPABASE_URL = "https://pusrbmnxmgfwyatdkiql.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1c3JibW54bWdmd3lhdGRraXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjk4OTYsImV4cCI6MjA4OTgwNTg5Nn0.AJcquNKkTBYbTdnN_4OD7DzwXpwJD1BKw_aXnL-K4FY";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// -------- REGISTER --------
async function register(){
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { data, error } = await db.auth.signUp({
    email,
    password
  });

  if(error) return alert(error.message);

  // guardar en tabla clientes
  await db.from('clientes').insert({
    email,
    created: new Date().toISOString()
  });

  alert("Registrado!");
}

// -------- LOGIN --------
async function login(){
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { data, error } = await db.auth.signInWithPassword({
    email,
    password
  });

  if(error) return alert(error.message);

  initApp();
}

// -------- LOGOUT --------
async function logout(){
  await db.auth.signOut();
  location.reload();
}

// -------- INIT --------
async function initApp(){
  document.getElementById('auth').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');

  const { data: { user } } = await db.auth.getUser();

  loadOps(user.email);

  if(user.email === "admin@gmail.com"){
    document.getElementById('admin').classList.remove('hidden');
    loadAdmin();
  }
}

// -------- CREAR OPERACION --------
async function crearOp(){
  const { data: { user } } = await db.auth.getUser();

  await db.from('operaciones').insert({
    user_email: user.email,
    envio: document.getElementById('send').value,
    recibe: document.getElementById('receive').value,
    estado: "pendiente",
    created: new Date().toISOString()
  });

  loadOps(user.email);
}

// -------- MIS OPERACIONES --------
async function loadOps(email){
  const { data } = await db
    .from('operaciones')
    .select('*')
    .eq('user_email', email)
    .order('created', { ascending:false });

  document.getElementById('ops').innerHTML =
    data.map(o=>`
      <div class="card">${o.envio} → ${o.recibe}</div>
    `).join('');
}

// -------- ADMIN --------
async function loadAdmin(){
  const { data: users } = await db.from('clientes').select('*');
  const { data: ops } = await db.from('operaciones').select('*');
  const { data: msgs } = await db.from('mensajes').select('*');

  document.getElementById('users').innerHTML =
    users.map(u=>`<div class="card">${u.email}</div>`).join('');

  document.getElementById('allOps').innerHTML =
    ops.map(o=>`<div class="card">${o.user_email} → ${o.envio}</div>`).join('');

  document.getElementById('msgs').innerHTML =
    msgs.map(m=>`<div class="card">${m.user_email}: ${m.texto}</div>`).join('');
}

// -------- AUTO SESSION --------
db.auth.getSession().then(({ data })=>{
  if(data.session){
    initApp();
  }
});
</script>

</body>
</html>
