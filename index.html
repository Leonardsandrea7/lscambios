<html lang="es">
<head>

/* ... resto del CSS ... */
</style>
</head>
<body>

<script>
  // CONFIGURACIÓN DE SUPABASE
  const SB_URL = 'https://pusrbmnxmgfwyatdkiql.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1c3JibW54bWdmd3lhdGRraXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjk4OTYsImV4cCI6MjA4OTgwNTg5Nn0.AJcquNKkTBYbTdnN_4OD7DzwXpwJD1BKw_aXnL-K4FY';
  
  // Inicialización con persistencia en Cookies para evitar el cierre de sesión
  const supabase = exports.createClient(SB_URL, SB_KEY, {
    auth: {
      persistSession: true,
      storageKey: 'sb-auth-token',
      storage: window.localStorage // Se usa el motor interno pero Supabase lo gestiona para Auth
    }
  });

  // --- LÓGICA DE DATOS ---
  // Ya no usamos funciones manuales de localStorage (gS, sS, clS).
  // Ahora consultamos directamente la sesión activa de Supabase.

  async function getActiveSession() {
    const { data: { session } } = await supabase.auth.getSession();
    return session;
  }

  // --- REGISTRO Y LOGIN ---
  async function handleRegister(email, password, metadata) {
    const { data, error } = await supabase.auth.signUp({
      email,
      password,
      options: { data: metadata }
    });
    if (error) throw error;
    // Los datos se guardan automáticamente en tu tabla 'users' de Supabase
    return data;
  }

  async function handleLogin(email, password) {
    const { data, error } = await supabase.auth.signInWithPassword({
      email,
      password
    });
    if (error) throw error;
    return data;
  }

  // --- ACTUALIZACIÓN EN TIEMPO REAL ---
  document.addEventListener('DOMContentLoaded', async () => {
    // 1. Cargar tasas desde Supabase
    await sbLoadRates();
    renderLPRates();

    // 2. Verificar si hay un usuario conectado sin usar LocalStorage manual
    const session = await getActiveSession();
    
    if (session) {
      // El usuario está conectado, cargamos sus datos de Supabase
      const { data: profile } = await supabase
        .from('profiles')
        .select('*')
        .eq('id', session.user.id)
        .single();

      if (profile) {
        // Refrescamos historial de operaciones en tiempo real
        profile.hist = await sbGetOps(session.user.email);
        
        // Actualizamos la navegación del Dashboard (goD())
        updLPNav(profile); 
        goD(); 
      }
    }
    
    setTimeout(playIntro, 400);
  });

  // Función para cerrar sesión limpiamente
  async function signOut() {
    await supabase.auth.signOut();
    window.location.reload();
  }

  // ... (Resto de tus funciones de interfaz renderLPRates, playIntro, etc.) ...
</script>
</body>
</html>
