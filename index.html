<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>App Supabase PRO</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body { font-family: Arial; background:#0f172a; color:#fff; padding:20px; }
input, button { margin:5px; padding:10px; }
.hidden { display:none; }
.card { border:1px solid #334155; padding:10px; margin:10px 0; }
</style>
</head>
<body>

<h1>App PRO</h1>

<div id="auth">
  <h2>Login / Registro</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Registrar</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" class="hidden">
  <button onclick="logout()">Cerrar sesión</button>

  <h2>Crear operación</h2>
  <input id="send" placeholder="Envías">
  <input id="receive" placeholder="Recibes">
  <button onclick="crearOp()">Crear</button>

  <h3>Mis operaciones</h3>
  <div id="ops"></div>

  <!-- 🔽 SOLO AGREGADO (NO CAMBIA TU UI EXISTENTE) -->
  <h3>Soporte</h3>
  <input id="msg-text" placeholder="Mensaje">
  <input type="file" id="msg-file">
  <button onclick="sendMessage()">Enviar</button>
  <div id="chat"></div>
</div>

<div id="admin" class="hidden">
  <h2>ADMIN</h2>

  <h3>Usuarios</h3>
  <div id="users"></div>

  <h3>Operaciones</h3>
  <div id="allOps"></div>

  <h3>Mensajes</h3>
  <div id="msgs"></div>

  <!-- 🔽 SOLO AGREGADO -->
  <h3>Responder cliente</h3>
  <select id="chatUser" onchange="loadAdminChat()"></select>
  <div id="adminChat"></div>
  <input id="adminMsg" placeholder="Responder">
  <button onclick="sendAdminMsg()">Enviar</button>
</div>

<script>
const SUPABASE_URL = "https://pusrbmnxmgfwyatdkiql.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1c3JibW54bWdmd3lhdGRraXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjk4OTYsImV4cCI6MjA4OTgwNTg5Nn0.AJcquNKkTBYbTdnN_4OD7DzwXpwJD1BKw_aXnL-K4FY";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// -------- REGISTER --------
async function register(){
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { error } = await db.auth.signUp({ email, password });
  if(error) return alert(error.message);

  await db.from('clientes').insert({
    email,
    created: new Date().toISOString()
  });

  alert("Registrado!");
}

// -------- LOGIN --------
async function login(){
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { error } = await db.auth.signInWithPassword({ email, password });
  if(error) return alert(error.message);

  initApp();
}

// -------- LOGOUT --------
async function logout(){
  await db.auth.signOut();
  location.reload();
}

// -------- INIT --------
async function initApp(){
  document.getElementById('auth').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');

  const { data: { user } } = await db.auth.getUser();

  loadOps(user.email);
  loadChat(user.email);

  if(user.email === "admin@gmail.com"){
    document.getElementById('admin').classList.remove('hidden');
    loadAdmin();
  }
}

// -------- CREAR OPERACION --------
async function crearOp(){
  const { data: { user } } = await db.auth.getUser();

  await db.from('operaciones').insert({
    user_email: user.email,
    envio: document.getElementById('send').value,
    recibe: document.getElementById('receive').value,
    estado: "pendiente",
    created: new Date().toISOString()
  });

  loadOps(user.email);
}

// -------- MIS OPERACIONES --------
async function loadOps(email){
  const { data } = await db
    .from('operaciones')
    .select('*')
    .eq('user_email', email)
    .order('created', { ascending:false });

  document.getElementById('ops').innerHTML =
    data.map(o=>`
      <div class="card">${o.envio} → ${o.recibe}</div>
    `).join('');
}

// -------- MENSAJES CLIENTE --------
async function sendMessage(){
  const { data: { user } } = await db.auth.getUser();

  const texto = document.getElementById('msg-text').value;
  const file = document.getElementById('msg-file').files[0];

  let imageUrl = null;

  if(file){
    const fileName = Date.now() + "_" + file.name;

    await db.storage.from('comprobantes').upload(fileName, file);

    const { data } = db.storage
      .from('comprobantes')
      .getPublicUrl(fileName);

    imageUrl = data.publicUrl;
  }

  await db.from('mensajes').insert({
    user_email: user.email,
    texto,
    imagen: imageUrl,
    enviado_por: 'user'
  });

  loadChat(user.email);
}

async function loadChat(email){
  const { data } = await db
    .from('mensajes')
    .select('*')
    .eq('user_email', email)
    .order('created', { ascending:true });

  document.getElementById('chat').innerHTML =
    data.map(m=>`
      <div class="card">
        <b>${m.enviado_por}</b>: ${m.texto || ''}
        ${m.imagen ? `<br><img src="${m.imagen}" width="200">` : ''}
      </div>
    `).join('');
}

// -------- ADMIN --------
async function loadAdmin(){
  const { data: users } = await db.from('clientes').select('*');
  const { data: ops } = await db.from('operaciones').select('*');
  const { data: msgs } = await db.from('mensajes').select('*');

  document.getElementById('users').innerHTML =
    users.map(u=>`<div class="card">${u.email}</div>`).join('');

  document.getElementById('allOps').innerHTML =
    ops.map(o=>`<div class="card">${o.user_email} → ${o.envio}</div>`).join('');

  document.getElementById('msgs').innerHTML =
    msgs.map(m=>`<div class="card">${m.user_email}: ${m.texto}</div>`).join('');

  // select usuarios para chat
  document.getElementById('chatUser').innerHTML =
    users.map(u=>`<option value="${u.email}">${u.email}</option>`).join('');
}

async function loadAdminChat(){
  const email = document.getElementById('chatUser').value;

  const { data } = await db
    .from('mensajes')
    .select('*')
    .eq('user_email', email)
    .order('created', { ascending:true });

  document.getElementById('adminChat').innerHTML =
    data.map(m=>`
      <div class="card">
        <b>${m.enviado_por}</b>: ${m.texto || ''}
        ${m.imagen ? `<br><img src="${m.imagen}" width="200">` : ''}
      </div>
    `).join('');
}

async function sendAdminMsg(){
  const email = document.getElementById('chatUser').value;
  const texto = document.getElementById('adminMsg').value;

  await db.from('mensajes').insert({
    user_email: email,
    texto,
    enviado_por: 'admin'
  });

  loadAdminChat();
}

// -------- AUTO SESSION --------
db.auth.getSession().then(({ data })=>{
  if(data.session){
    initApp();
  }
});
</script>

</body>
</html>
