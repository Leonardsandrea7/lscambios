<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>App Supabase</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body { font-family: Arial; background:#111; color:#fff; padding:20px; }
input, button { margin:5px; padding:10px; }
.hidden { display:none; }
.card { border:1px solid #333; padding:10px; margin:10px 0; }
</style>
</head>
<body>

<h1>App Supabase</h1>

<div id="login">
  <h2>Login</h2>
  <input id="li-e" placeholder="Email">
  <input id="li-p" type="password" placeholder="Password">
  <button onclick="doLogin()">Entrar</button>
</div>

<div id="register">
  <h2>Registro</h2>
  <input id="rg-n" placeholder="Nombre">
  <input id="rg-a" placeholder="Apellido">
  <input id="rg-ci" placeholder="Cédula">
  <input id="rg-e" placeholder="Email">
  <input id="rg-tel" placeholder="Teléfono">
  <input id="rg-banco" placeholder="Banco">
  <input id="rg-pm-tel" placeholder="Pago móvil tel">
  <input id="rg-pm-ci" placeholder="Pago móvil CI">
  <input id="rg-cdiv" placeholder="Cuenta divisas">
  <input id="rg-bid" placeholder="Binance ID">
  <input id="rg-pw" type="password" placeholder="Password">
  <input id="rg-pw2" type="password" placeholder="Repetir Password">
  <button onclick="doRegister()">Registrar</button>
</div>

<div id="dashboard" class="hidden">
  <h2>Dashboard</h2>
  <button onclick="logout()">Salir</button>

  <h3>Crear operación</h3>
  <input id="op-send" placeholder="Envías">
  <input id="op-get" placeholder="Recibes">
  <button onclick="crearOp()">Crear</button>

  <h3>Mis operaciones</h3>
  <div id="ops"></div>

  <!-- SOPORTE (AGREGADO SIN CAMBIAR DISEÑO BASE) -->
  <h3>Soporte</h3>
  <input id="msg-text" placeholder="Mensaje">
  <input type="file" id="msg-file">
  <button onclick="sendMessage()">Enviar</button>
  <div id="chat"></div>
</div>

<div id="admin" class="hidden">
  <h2>ADMIN</h2>
  <button onclick="loadAdmin()">Recargar</button>

  <h3>Usuarios</h3>
  <div id="users"></div>

  <h3>Operaciones</h3>
  <div id="allOps"></div>

  <h3>Mensajes</h3>
  <div id="msgs"></div>

  <!-- RESPUESTA ADMIN -->
  <h3>Responder cliente</h3>
  <select id="chatUser" onchange="loadAdminChat()"></select>
  <div id="adminChat"></div>
  <input id="adminMsg" placeholder="Responder">
  <button onclick="sendAdminMsg()">Enviar</button>
</div>

<script>
const SUPABASE_URL = "https://pusrbmnxmgfwyatdkiql.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1c3JibW54bWdmd3lhdGRraXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjk4OTYsImV4cCI6MjA4OTgwNTg5Nn0.AJcquNKkTBYbTdnN_4OD7DzwXpwJD1BKw_aXnL-K4FY";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// -------- REGISTER --------
async function doRegister(){
  const g = id => document.getElementById(id).value.trim();

  const email = g('rg-e').toLowerCase();
  const pass = g('rg-pw');

  const { error: authError } = await db.auth.signUp({ email, password: pass });
  if(authError) return alert(authError.message);

  await db.from('clientes').insert({
    email,
    nombre: g('rg-n'),
    apellido: g('rg-a'),
    created: new Date().toISOString()
  });

  alert("Registrado!");
}

// -------- LOGIN --------
async function doLogin(){
  const email = document.getElementById('li-e').value;
  const pass = document.getElementById('li-p').value;

  const { error } = await db.auth.signInWithPassword({ email, password: pass });
  if(error) return alert(error.message);

  initApp();
}

// -------- LOGOUT --------
async function logout(){
  await db.auth.signOut();
  location.reload();
}

// -------- INIT --------
async function initApp(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('register').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');

  const { data: { user } } = await db.auth.getUser();

  loadOps(user.email);
  loadChat(user.email);

  setupRealtime(user.email);

  if(user.email === "admin@gmail.com"){
    document.getElementById('admin').classList.remove('hidden');
    loadAdmin();
    setupAdminRealtime();
  }
}

// -------- CREAR OPERACION --------
async function crearOp(){
  const { data: { user } } = await db.auth.getUser();

  await db.from('operaciones').insert({
    user_email: user.email,
    envio: document.getElementById('op-send').value,
    recibe: document.getElementById('op-get').value,
    estado: "pendiente",
    created: new Date().toISOString()
  });
}

// -------- OPERACIONES --------
async function loadOps(email){
  const { data } = await db.from('operaciones')
    .select('*')
    .eq('user_email', email)
    .order('created', { ascending:false });

  document.getElementById('ops').innerHTML =
    data.map(o=>`<div class="card">${o.envio} → ${o.recibe}</div>`).join('');
}

// -------- MENSAJES --------
async function sendMessage(){
  const { data: { user } } = await db.auth.getUser();

  const texto = document.getElementById('msg-text').value;
  const file = document.getElementById('msg-file').files[0];

  let imageUrl = null;

  if(file){
    const fileName = Date.now()+"_"+file.name;
    await db.storage.from('comprobantes').upload(fileName, file);
    const { data } = db.storage.from('comprobantes').getPublicUrl(fileName);
    imageUrl = data.publicUrl;
  }

  await db.from('mensajes').insert({
    user_email: user.email,
    texto,
    imagen: imageUrl,
    enviado_por: 'user'
  });
}

async function loadChat(email){
  const { data } = await db.from('mensajes')
    .select('*')
    .eq('user_email', email)
    .order('created', { ascending:true });

  document.getElementById('chat').innerHTML =
    data.map(m=>`
      <div class="card">
        <b>${m.enviado_por}</b>: ${m.texto || ''}
        ${m.imagen ? `<br><img src="${m.imagen}" width="200">` : ''}
      </div>
    `).join('');
}

// -------- ADMIN --------
async function loadAdmin(){
  const { data: users } = await db.from('clientes').select('*');
  const { data: ops } = await db.from('operaciones').select('*');
  const { data: msgs } = await db.from('mensajes').select('*');

  document.getElementById('users').innerHTML =
    users.map(u=>`<div class="card">${u.email}</div>`).join('');

  document.getElementById('allOps').innerHTML =
    ops.map(o=>`<div class="card">${o.user_email} → ${o.envio}</div>`).join('');

  document.getElementById('msgs').innerHTML =
    msgs.map(m=>`<div class="card">${m.user_email}: ${m.texto}</div>`).join('');

  document.getElementById('chatUser').innerHTML =
    users.map(u=>`<option value="${u.email}">${u.email}</option>`).join('');
}

async function loadAdminChat(){
  const email = document.getElementById('chatUser').value;
  loadChatAdmin(email);
}

async function loadChatAdmin(email){
  const { data } = await db.from('mensajes')
    .select('*')
    .eq('user_email', email)
    .order('created', { ascending:true });

  document.getElementById('adminChat').innerHTML =
    data.map(m=>`
      <div class="card">
        <b>${m.enviado_por}</b>: ${m.texto || ''}
        ${m.imagen ? `<br><img src="${m.imagen}" width="200">` : ''}
      </div>
    `).join('');
}

async function sendAdminMsg(){
  const email = document.getElementById('chatUser').value;
  const texto = document.getElementById('adminMsg').value;

  await db.from('mensajes').insert({
    user_email: email,
    texto,
    enviado_por: 'admin'
  });
}

// -------- REALTIME --------
function setupRealtime(email){
  db.channel('chat')
    .on('postgres_changes',
      { event: '*', schema: 'public', table: 'mensajes' },
      payload => {
        loadChat(email);
      }
    ).subscribe();

  db.channel('ops')
    .on('postgres_changes',
      { event: '*', schema: 'public', table: 'operaciones' },
      payload => {
        loadOps(email);
      }
    ).subscribe();
}

function setupAdminRealtime(){
  db.channel('admin')
    .on('postgres_changes',
      { event: '*', schema: 'public', table: 'mensajes' },
      payload => {
        loadAdmin();
      }
    ).subscribe();
}

// -------- AUTO LOGIN --------
db.auth.getSession().then(({ data })=>{
  if(data.session){
    initApp();
  }
});
</script>

</body>
</html>
